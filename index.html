<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Health App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-[#f2f2f7]">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import {
      Apple,
      Search,
      Flame,
      X,
      BarChart2
    } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

    function App() {
      // --- STATE MANAGEMENT ---
      const [calories, setCalories] = useState([]);
      const [workouts, setWorkouts] = useState([]);
      const [isCalorieModalOpen, setIsCalorieModalOpen] = useState(false);
      const [isWorkoutModalOpen, setIsWorkoutModalOpen] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const [isDetailModalOpen, setIsDetailModalOpen] = useState(false);
      const [calSearchDate, setCalSearchDate] = useState('');
      const [woSearchDate, setWoSearchDate] = useState('');
      const [isChartsModalOpen, setIsChartsModalOpen] = useState(false);

      // Form States
      const [calForm, setCalForm] = useState({
        name: '', amount: '', date: new Date().toISOString().split('T')[0], time:
          '12:00'
      });
      const [woForm, setWoForm] = useState({
        date: new Date().toISOString().split('T')[0], type: 'STRENGTH', exerciseName: '',
        weight: '', reps: '', sets: ''
      });

      // --- LOCAL STORAGE LOGIC ---
      const [isFirstLoad, setIsFirstLoad] = useState(true);

      useEffect(() => {
        const savedCalories = localStorage.getItem('obsidian_calories');
        const savedWorkouts = localStorage.getItem('obsidian_workouts');
        if (savedCalories) setCalories(JSON.parse(savedCalories));
        if (savedWorkouts) setWorkouts(JSON.parse(savedWorkouts));
        setIsFirstLoad(false);
      }, []);

      useEffect(() => {
        if (!isFirstLoad) {
          localStorage.setItem('obsidian_calories', JSON.stringify(calories));
        }
      }, [calories, isFirstLoad]);

      useEffect(() => {
        if (!isFirstLoad) {
          localStorage.setItem('obsidian_workouts', JSON.stringify(workouts));
        }
      }, [workouts, isFirstLoad]);

      // --- HELPER FUNCTIONS ---
      const getTodayCalories = () => {
        const today = new Date().toISOString().split('T')[0];
        return calories.filter(c => c.date === today).reduce((sum, curr) => sum + Number(curr.amount), 0);
      };

      const getWeeklyCalories = () => {
        if (calories.length === 0) return 0;
        const total = calories.reduce((sum, curr) => sum + Number(curr.amount), 0);
        return Math.round(total / (calories.length > 7 ? 7 : calories.length || 1));
      };

      // --- HANDLERS ---
      const handleAddCalorie = (e) => {
        e.preventDefault();
        if (!calForm.name || !calForm.amount) return alert("Isi data dengan lengkap.");

        const newEntry = {
          id: Date.now().toString(),
          name: calForm.name,
          amount: Number(calForm.amount),
          date: calForm.date,
          time: calForm.time
        };

        const updated = [newEntry, ...calories].sort((a, b) => {
          return new Date(`${b.date}T${b.time}`) - new Date(`${a.date}T${a.time}`);
        });

        setCalories(updated);
        setIsCalorieModalOpen(false);
        setCalForm({ name: '', amount: '', date: new Date().toISOString().split('T')[0], time: '12:00' });
      };

      const handleAddWorkout = (e) => {
        e.preventDefault();
        if (!woForm.exerciseName || !woForm.weight) return alert("Isi data latihan.");

        const newEntry = {
          id: Date.now().toString(),
          date: woForm.date,
          type: woForm.type,
          exercise: woForm.exerciseName,
          weight: Number(woForm.weight),
          reps: Number(woForm.reps),
          sets: Number(woForm.sets || 3)
        };

        const updated = [newEntry, ...workouts].sort((a, b) => new Date(b.date) - new Date(a.date));
        setWorkouts(updated);
        setIsWorkoutModalOpen(false);
        setWoForm({
          date: new Date().toISOString().split('T')[0], type: 'STRENGTH', exerciseName: '', weight: '', reps: '', sets: ''
        });
      };

      // --- GLASSMORPHISM STYLES UTILITIES ---
      const glassCard = "bg-white/60 ios-blur border border-white/80 shadow-[0_12px_40px_rgba(0,0,0,0.06)] rounded-[2.5rem] relative overflow-hidden before:absolute before:inset-0 before:bg-gradient-to-br before:from-white/60 before:to-white/10 before:pointer-events-none";
      const glassInput = "w-full bg-white/40 ios-blur border border-white/60 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-[#007AFF]/30 focus:bg-white/80 transition-all text-base font-semibold text-slate-800 placeholder-slate-400 font-montserrat shadow-[inset_0_2px_5px_rgba(0,0,0,0.01)]";
      const glassInputCenter = glassInput + " text-center";

      const Header = () => (
        <header className="sticky top-0 z-50 bg-white/60 ios-blur border-b border-white/80 px-4 md:px-10 h-24 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 bg-black rounded-xl flex items-center justify-center rotate-3 scale-110">
              <span className="text-white font-black text-lg">K</span>
            </div>
            <h2 className="text-2xl md:text-3xl font-black tracking-tighter text-slate-800 mt-0.5">Kaloriku</h2>
          </div>

          <div className="flex items-center gap-2 hover-scale">
            <button onClick={() => setIsWorkoutModalOpen(true)}
              className="p-3 md:px-6 bg-white/60 border border-white/80 text-slate-800 text-xs font-bold tracking-wider hover:bg-white/90 rounded-2xl transition-all shadow-sm">
              <span className="md:hidden"><Flame size={22} /></span>
              <span className="hidden md:inline uppercase">ADD WORKOUT</span>
            </button>
            <button onClick={() => setIsCalorieModalOpen(true)}
              className="p-3 md:px-6 bg-black text-white text-xs font-bold tracking-wider hover:bg-slate-800 rounded-2xl shadow-lg transition-all">
              <span className="md:hidden"><Apple size={22} /></span>
              <span className="hidden md:inline uppercase">ADD CALORIES</span>
            </button>
          </div>
        </header>
      );

      const Dashboard = () => (
        <div className="p-6 md:p-10 space-y-8 md:space-y-12 max-w-[1400px] mx-auto animate-in fade-in duration-700">
          {/* Top Stats */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
            {/* Unified Calorie Card */}
            <div
              onClick={() => setIsChartsModalOpen(true)}
              className={`${glassCard} md:col-span-2 p-6 md:p-10 flex flex-col md:flex-row items-center gap-8 cursor-pointer hover:bg-white/70 transition-all active:scale-[0.99] group relative`}>

              {/* Progress Circle (Decorative) */}
              <div className="relative w-36 h-36 shrink-0 transform scale-110 md:scale-125">
                <svg className="w-full h-full transform -rotate-90">
                  <circle cx="72" cy="72" r="62" stroke="currentColor" strokeWidth="10" fill="transparent" className="text-slate-200" />
                  <circle cx="72" cy="72" r="62" stroke="currentColor" strokeWidth="10" fill="transparent" strokeDasharray={389.5} strokeDashoffset={389.5 - (Math.min(getTodayCalories() / 2500, 1) * 389.5)} className="text-black transition-all duration-1000" />
                </svg>
                <div className="absolute inset-0 flex flex-col items-center justify-center">
                  <span className="text-2xl font-black text-slate-800">{Math.round(Math.min(getTodayCalories() / 2500, 1) * 100)}%</span>
                  <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Goal</span>
                </div>
              </div>

              {/* Stats Labels */}
              <div className="flex-1 w-full grid grid-cols-3 gap-6 border-l border-slate-200/50 md:pl-12">
                <div>
                  <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Today</p>
                  <div className="flex items-baseline gap-1">
                    <span className="text-2xl md:text-4xl font-black text-slate-800">{getTodayCalories()}</span>
                    <span className="text-xs font-bold text-slate-500">kcal</span>
                  </div>
                </div>
                <div>
                  <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Average</p>
                  <div className="flex items-baseline gap-1">
                    <span className="text-2xl md:text-3xl font-black text-slate-800">{getWeeklyCalories()}</span>
                    <span className="text-xs font-bold text-slate-500">kcal</span>
                  </div>
                </div>
                <div>
                  <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Month</p>
                  <div className="flex items-baseline gap-1">
                    <span className="text-2xl md:text-3xl font-black text-slate-800">{(getWeeklyCalories() * 4 / 1000).toFixed(1)}k</span>
                  </div>
                </div>
              </div>

              {/* Chart Icon Hint */}
              <div className="absolute top-6 right-6 p-3 rounded-full bg-slate-100 text-slate-400 opacity-0 group-hover:opacity-100 transition-opacity">
                <BarChart2 size={18} />
              </div>
            </div>

            {/* Streak Card */}
            <div className={`${glassCard} p-6 md:p-10 flex flex-col justify-center border-l-8 border-l-black`}>
              <p className="text-xs md:text-sm font-bold text-slate-500 tracking-widest mb-3 uppercase">Workout Streak</p>
              <div className="flex items-baseline gap-3 drop-shadow-sm">
                <h3 className="text-5xl md:text-7xl font-black text-slate-800">
                  {[...new Set(workouts.map(w => w.date))].length}
                </h3>
                <span className="text-base font-bold text-slate-600">DAYS</span>
              </div>
              <div className="mt-6 flex gap-3">
                {[1, 2, 3, 4, 5, 6, 7].map(i => (
                  <div key={i} className={`w-3 h-3 md:w-4 md:h-4 rounded-full ${i <= [...new Set(workouts.map(w => w.date))].length ? 'bg-black shadow-[0_0_12px_rgba(0,0,0,0.4)]'
                    : 'bg-white/50'}`}></div>
                ))}
              </div>
            </div>
          </div>

          {/* Dual Timelines Area - Vertical Stack on Mobile, Two Columns on Desktop */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-12 mb-16">
            {/* Calories Timeline */}
            <div className={`${glassCard} p-6 md:p-10 h-auto flex flex-col`}>
                <div className="flex items-center justify-between mb-8">
                  <div className="flex items-center gap-4">
                    <div className="p-3 bg-orange-100 rounded-2xl text-orange-600 shadow-sm transition-transform hover:scale-110">
                      <Apple size={24} />
                    </div>
                    <h3 className="font-black text-slate-800 tracking-tight uppercase text-xl md:text-2xl">Nutrition Log</h3>
                  </div>
                </div>

                {/* Search Filter */}
                <div className="flex items-center gap-4 bg-white/60 px-5 py-3 rounded-2xl border border-white/80 shadow-sm mb-8 transition-all focus-within:ring-2 focus-within:ring-orange-200">
                  <Search size={18} className="text-slate-400" />
                  <input
                    type="date"
                    value={calSearchDate}
                    onChange={(e) => setCalSearchDate(e.target.value)}
                    className="bg-transparent border-none text-sm font-black text-slate-800 focus:ring-0 p-0 w-full"
                  />
                  {calSearchDate && (
                    <button onClick={() => setCalSearchDate('')} className="text-slate-400 hover:text-slate-800">
                      <X size={18} />
                    </button>
                  )}
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar space-y-6 pr-2">
                  {(() => {
                    const filteredCals = calSearchDate ? calories.filter(c => c.date === calSearchDate) : calories;
                    const groupedCals = filteredCals.reduce((acc, curr) => {
                      if (!acc[curr.date]) acc[curr.date] = [];
                      acc[curr.date].push(curr);
                      return acc;
                    }, {});

                    const dates = Object.keys(groupedCals).sort((a, b) => new Date(b) - new Date(a));

                    if (dates.length === 0) return (
                      <div className="text-center py-24 opacity-30">
                        <Search size={48} className="mx-auto mb-4" />
                        <p className="font-black uppercase tracking-[0.2em] text-sm">Empty History</p>
                      </div>
                    );

                    return dates.map(date => (
                      <div key={date} className="relative">
                        <div className="flex items-center gap-3 mb-4 px-2">
                          <div className="h-[2px] bg-slate-200 flex-1"></div>
                          <span className="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">{date === new Date().toISOString().split('T')[0] ? 'TODAY' : date}</span>
                          <div className="h-[2px] bg-slate-200 flex-1"></div>
                        </div>
                        <div className="space-y-4">
                          {groupedCals[date].sort((a, b) => (b.time || '').localeCompare(a.time || '')).map(item => (
                            <div key={item.id}
                              onClick={() => { setSelectedItem({ ...item, type: 'NUTRITION' }); setIsDetailModalOpen(true); }}
                              className="p-5 md:p-6 rounded-3xl bg-white/50 border border-white/70 flex justify-between items-center hover:bg-white/90 transition-all shadow-md cursor-pointer active:scale-[0.97] group">
                              <div className="flex-1 min-w-0 pr-4">
                                <h4 className="font-black text-lg md:text-xl text-slate-800 truncate group-hover:text-orange-600 transition-colors">{item.name}</h4>
                                <p className="text-xs md:text-sm text-slate-500 font-bold mt-1 uppercase tracking-wider">{item.time}</p>
                              </div>
                              <div className="text-right shrink-0">
                                <span className="text-2xl md:text-3xl font-black text-slate-900 leading-none">{item.amount}</span>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Kcal</p>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ));
                  })()}
                </div>
            </div>

            {/* Workouts Timeline */}
            <div className={`${glassCard} p-6 md:p-10 h-auto flex flex-col`}>
                <div className="flex items-center justify-between mb-8">
                  <div className="flex items-center gap-4">
                    <div className="p-3 bg-blue-100 rounded-2xl text-blue-600 shadow-sm transition-transform hover:scale-110">
                      <Flame size={24} />
                    </div>
                    <h3 className="font-black text-slate-800 tracking-tight uppercase text-xl md:text-2xl">Workout Logs</h3>
                  </div>
                </div>

                {/* Search Filter */}
                <div className="flex items-center gap-4 bg-white/60 px-5 py-3 rounded-2xl border border-white/80 shadow-sm mb-8 transition-all focus-within:ring-2 focus-within:ring-blue-200">
                  <Search size={18} className="text-slate-400" />
                  <input
                    type="date"
                    value={woSearchDate}
                    onChange={(e) => setWoSearchDate(e.target.value)}
                    className="bg-transparent border-none text-sm font-black text-slate-800 focus:ring-0 p-0 w-full"
                  />
                  {woSearchDate && (
                    <button onClick={() => setWoSearchDate('')} className="text-slate-400 hover:text-slate-800">
                      <X size={18} />
                    </button>
                  )}
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar space-y-6 pr-2">
                  {(() => {
                    const filteredWo = woSearchDate ? workouts.filter(w => w.date === woSearchDate) : workouts;
                    const groupedWo = filteredWo.reduce((acc, curr) => {
                      if (!acc[curr.date]) acc[curr.date] = [];
                      acc[curr.date].push(curr);
                      return acc;
                    }, {});

                    const dates = Object.keys(groupedWo).sort((a, b) => new Date(b) - new Date(a));

                    if (dates.length === 0) return (
                      <div className="text-center py-24 opacity-30">
                        <Search size={48} className="mx-auto mb-4" />
                        <p className="font-black uppercase tracking-[0.2em] text-sm">No Trainings</p>
                      </div>
                    );

                    return dates.map(date => (
                      <div key={date} className="relative">
                        <div className="flex items-center gap-3 mb-4 px-2">
                          <div className="h-[2px] bg-slate-200 flex-1"></div>
                          <span className="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">{date === new Date().toISOString().split('T')[0] ? 'TODAY' : date}</span>
                          <div className="h-[2px] bg-slate-200 flex-1"></div>
                        </div>
                        <div className="space-y-4">
                          {groupedWo[date].map(item => (
                            <div key={item.id}
                              onClick={() => { setSelectedItem({ ...item, isWorkout: true }); setIsDetailModalOpen(true); }}
                              className="p-5 md:p-6 rounded-3xl bg-white/50 border border-white/70 flex justify-between items-center hover:bg-white/90 transition-all shadow-md cursor-pointer active:scale-[0.97] group">
                              <div className="flex-1 min-w-0 pr-4">
                                <div className="flex items-center gap-2 mb-2">
                                  <span className="px-2 py-0.5 rounded-lg bg-blue-600/10 text-blue-600 text-[10px] font-black uppercase tracking-widest">{item.type}</span>
                                  <h4 className="font-black text-lg md:text-xl text-slate-800 truncate group-hover:text-blue-600 transition-colors">{item.exercise}</h4>
                                </div>
                                <p className="text-xs md:text-sm text-slate-500 font-bold uppercase tracking-wider">{item.sets} Sets x {item.reps} Reps</p>
                              </div>
                              <div className="text-right shrink-0">
                                <span className="text-2xl md:text-3xl font-black text-slate-900 leading-none">{item.weight}</span>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">KG</p>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ));
                  })()}
                </div>
            </div>
          </div>
        </div>
      );

      // --- MODALS ---
      const Modals = () => (
        <>
          {isCalorieModalOpen && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center p-4">
              <div
                className="bg-white/90 ios-blur p-8 w-full max-w-md border border-white/80 shadow-[0_32px_64px_rgba(0,0,0,0.15)] rounded-[2.5rem] animate-in zoom-in-95 duration-200 relative overflow-hidden">
                <div className="flex justify-between items-center mb-8">
                  <h3 className="text-2xl font-black tracking-tight text-slate-800">ADD CALORIES</h3>
                  <button onClick={() => setIsCalorieModalOpen(false)} className="bg-white/50 p-3 rounded-full border border-white/80 shadow-sm text-slate-400 hover:text-slate-800 transition-all">
                    <X size={24} />
                  </button>
                </div>
                <form onSubmit={handleAddCalorie} className="space-y-6">
                  <div>
                    <label className="text-[11px] font-black text-slate-500 tracking-[0.2em] block mb-3 uppercase">Selected Date</label>
                    <input type="date" required value={calForm.date} onChange={e => setCalForm({...calForm, date: e.target.value})} className={glassInput} />
                  </div>
                  <div>
                    <label className="text-[11px] font-black text-slate-500 tracking-[0.2em] block mb-3 uppercase">Meal Name</label>
                    <input type="text" required value={calForm.name} onChange={e => setCalForm({...calForm, name: e.target.value})} placeholder="e.g. Grilled Chicken" className={glassInput} />
                  </div>
                  <div className="space-y-6">
                    <div>
                      <label className="text-[11px] font-black text-slate-500 tracking-[0.2em] block mb-3 uppercase">Amount (Kcal)</label>
                      <input type="number" required value={calForm.amount} onChange={e => setCalForm({...calForm, amount: e.target.value})} placeholder="0" className={glassInputCenter} />
                    </div>
                    <div>
                      <label className="text-[11px] font-black text-slate-500 tracking-[0.2em] block mb-3 uppercase">Logging Time</label>
                      <input type="time" required value={calForm.time} onChange={e => setCalForm({...calForm, time: e.target.value})} className={glassInputCenter} />
                    </div>
                  </div>
                  <button type="submit" className="w-full bg-black text-white font-black tracking-widest py-5 mt-4 rounded-2xl shadow-xl hover:bg-slate-800 active:scale-95 transition-all uppercase">
                    Register Intake
                  </button>
                </form>
              </div>
            </div>
          )}

          {isWorkoutModalOpen && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center p-4">
              <div
                className="bg-white/90 ios-blur p-8 w-full max-w-md border border-white/80 shadow-[0_32px_64px_rgba(0,0,0,0.15)] rounded-[2.5rem] animate-in zoom-in-95 duration-200 relative overflow-hidden">
                <div className="flex justify-between items-center mb-8">
                  <h3 className="text-2xl font-black tracking-tight text-slate-800">LOG WORKOUT</h3>
                  <button onClick={() => setIsWorkoutModalOpen(false)} className="bg-white/50 p-3 rounded-full border border-white/80 shadow-sm text-slate-400 hover:text-slate-800 transition-all">
                    <X size={24} />
                  </button>
                </div>
                <form onSubmit={handleAddWorkout} className="space-y-6">
                  <div className="space-y-6">
                    <div>
                      <label className="text-[11px] font-black text-slate-500 tracking-[0.2em] block mb-3 uppercase">Session Date</label>
                      <input type="date" required value={woForm.date} onChange={e => setWoForm({...woForm, date: e.target.value})} className={glassInput} />
                    </div>
                    <div>
                      <label className="text-[11px] font-black text-slate-500 tracking-[0.2em] block mb-3 uppercase">Target Type</label>
                      <select value={woForm.type} onChange={e => setWoForm({ ...woForm, type: e.target.value })} className={`${glassInput} appearance-none cursor-pointer text-center`}>
                        <option>STRENGTH</option>
                        <option>HYPERTROPHY</option>
                        <option>ENDURANCE</option>
                        <option>MOBILITY</option>
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="text-[11px] font-black text-slate-500 tracking-[0.2em] block mb-3 uppercase">Exercise</label>
                    <input type="text" required value={woForm.exerciseName} onChange={e => setWoForm({...woForm, exerciseName: e.target.value})} placeholder="e.g. Bench Press" className={glassInput} />
                  </div>
                  <div className="space-y-6">
                    <div>
                      <label className="text-[11px] font-black text-slate-500 tracking-[0.2em] block mb-3 uppercase">Sets</label>
                      <input type="number" min="1" required value={woForm.sets} onChange={e => setWoForm({...woForm, sets: e.target.value})} placeholder="3" className={glassInputCenter} />
                    </div>
                    <div>
                      <label className="text-[11px] font-black text-slate-500 tracking-[0.2em] block mb-3 uppercase">Reps</label>
                      <input type="number" min="1" required value={woForm.reps} onChange={e => setWoForm({...woForm, reps: e.target.value})} placeholder="10" className={glassInputCenter} />
                    </div>
                    <div>
                      <label className="text-[11px] font-black text-slate-500 tracking-[0.2em] block mb-3 uppercase">Intensity (KG)</label>
                      <input type="number" min="0" required value={woForm.weight} onChange={e => setWoForm({...woForm, weight: e.target.value})} placeholder="60" className={glassInputCenter} />
                    </div>
                  </div>
                  <button type="submit" className="w-full bg-black text-white font-black tracking-widest py-5 mt-4 rounded-2xl shadow-xl hover:bg-slate-800 active:scale-95 transition-all uppercase">
                    Save Session
                  </button>
                </form>
              </div>
            </div>
          )}

          {isDetailModalOpen && selectedItem && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center p-4" onClick={() => setIsDetailModalOpen(false)}>
              <div className="bg-white/90 ios-blur p-8 w-full max-w-sm border border-white/80 shadow-2xl rounded-[2.5rem] animate-in zoom-in-95 duration-200" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-8">
                  <span className={`px-4 py-1.5 rounded-full text-xs font-black tracking-widest uppercase ${selectedItem.isWorkout ? 'bg-blue-100 text-blue-600' : 'bg-orange-100 text-orange-600'}`}>
                    {selectedItem.isWorkout ? 'Workout Session' : 'Nutritional Intake'}
                  </span>
                  <button onClick={() => setIsDetailModalOpen(false)} className="bg-white/50 p-2.5 rounded-full border border-white/80 shadow-sm text-slate-400 hover:text-slate-800 transition-all">
                    <X size={20} />
                  </button>
                </div>
                <div className="space-y-6">
                  <div>
                    <h3 className="text-3xl font-black text-slate-800 leading-tight">
                      {selectedItem.isWorkout ? selectedItem.exercise : selectedItem.name}
                    </h3>
                    <p className="text-sm font-bold text-slate-400 mt-2 uppercase tracking-[0.2em]">{selectedItem.date} • {selectedItem.time || '00:00'}</p>
                  </div>
                  <div className="grid grid-cols-2 gap-4 pt-4">
                    <div className="bg-white/50 p-5 rounded-3xl border border-white/60">
                      <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">{selectedItem.isWorkout ? 'LOAD' : 'ENERGY'}</p>
                      <div className="flex items-baseline gap-1">
                        <span className="text-2xl font-black text-slate-800">{selectedItem.isWorkout ? `${selectedItem.weight}` : `${selectedItem.amount}`}</span>
                        <span className="text-xs font-bold text-slate-400 uppercase">{selectedItem.isWorkout ? 'KG' : 'KCAL'}</span>
                      </div>
                    </div>
                    {selectedItem.isWorkout ? (
                      <div className="bg-white/50 p-5 rounded-3xl border border-white/60">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">REPS</p>
                        <div className="flex items-baseline gap-1">
                          <span className="text-2xl font-black text-slate-800">{selectedItem.sets}x{selectedItem.reps}</span>
                        </div>
                      </div>
                    ) : (
                      <div className="bg-white/50 p-5 rounded-3xl border border-white/60">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">TYPE</p>
                        <div className="flex items-baseline gap-1">
                          <span className="text-xs font-black text-slate-800">WHOLE FOOD</span>
                        </div>
                      </div>
                    )}
                  </div>
                  <button onClick={() => {
                      if (selectedItem.isWorkout) setWorkouts(prev => prev.filter(w => w.id !== selectedItem.id));
                      else setCalories(prev => prev.filter(c => c.id !== selectedItem.id));
                      setIsDetailModalOpen(false);
                    }}
                    className="w-full py-5 text-rose-500 text-xs font-black tracking-[0.2em] hover:bg-rose-50 transition-all rounded-2xl border border-rose-100 mt-6 uppercase">
                    Remove Entry
                  </button>
                </div>
              </div>
            </div>
          )}
          {isChartsModalOpen && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] flex items-center justify-center p-4" onClick={() => setIsChartsModalOpen(false)}>
              <div className="bg-white/95 ios-blur w-full max-w-4xl max-h-[90vh] overflow-y-auto border border-white/80 shadow-2xl rounded-[3rem] animate-in zoom-in-95 duration-300 p-8 md:p-12" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-10">
                  <div>
                    <h2 className="text-4xl font-black text-slate-800 tracking-tighter">ANALYTICS</h2>
                    <p className="text-xs font-black text-slate-400 tracking-[0.2em] uppercase mt-2">Health Data Insights</p>
                  </div>
                  <button onClick={() => setIsChartsModalOpen(false)} className="bg-white p-4 rounded-full shadow-lg text-slate-400 hover:text-slate-800 transition-all">
                    <X size={28} />
                  </button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                  <div className="bg-white/40 p-8 rounded-[2.5rem] border border-white/60 flex flex-col h-72 shadow-sm">
                    <p className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-8">Daily Intake</p>
                    <div className="flex-1 flex items-end justify-between gap-2">
                      {[40, 70, 45, 90, 65, 80, 50].map((h, i) => (
                        <div key={i} className="flex-1 bg-black/5 rounded-t-xl relative group overflow-hidden" style={{ height: `${h}%` }}>
                          <div className="absolute inset-0 bg-black opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="bg-white/40 p-8 rounded-[2.5rem] border border-white/60 flex flex-col h-72 shadow-sm">
                    <p className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-8">Weekly Flux</p>
                    <div className="flex-1 flex items-end justify-between gap-3">
                      {[60, 40, 85, 55].map((h, i) => (
                        <div key={i} className={`flex-1 rounded-t-xl relative group ${i === 2 ? 'bg-black shadow-lg' : 'bg-black/10'}`} style={{ height: `${h}%` }}></div>
                      ))}
                    </div>
                  </div>
                  <div className="bg-white/40 p-8 rounded-[2.5rem] border border-white/60 flex flex-col h-72 shadow-sm">
                    <p className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-8">Volume</p>
                    <div className="flex-1 flex items-center justify-center relative">
                      <svg className="w-40 h-40 transform -rotate-90">
                        <circle cx="80" cy="80" r="65" stroke="currentColor" strokeWidth="15" fill="transparent" className="text-slate-100" />
                        <circle cx="80" cy="80" r="65" stroke="currentColor" strokeWidth="15" fill="transparent" strokeDasharray={408} strokeDashoffset={408 - (0.65 * 408)} className="text-black" />
                      </svg>
                      <div className="absolute inset-0 flex flex-col items-center justify-center">
                        <span className="text-3xl font-black text-slate-800">65%</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </>
      );

      // --- MAIN RENDER ---
      return (
        <>
          <style>
            {` @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Poppins:wght@700;900&display=swap');
        h1, h2, h3, h4, .font-poppins { font-family: 'Poppins', sans-serif !important; }
        body, p, span, div, button, input, select { font-family: 'Montserrat', sans-serif; font-size: 16px; }
        .ios-blur { backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0, 0, 0, 0.1); border-radius: 20px; }
        `}
          </style>
          <div className="min-h-screen bg-[#f2f2f7] text-slate-800 font-montserrat selection:bg-[#007AFF] selection:text-white flex relative overflow-hidden">
            <div className="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-[#007AFF]/20 mix-blend-multiply filter blur-[120px] opacity-80 pointer-events-none"></div>
            <div className="absolute top-[20%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-[#5856D6]/20 mix-blend-multiply filter blur-[120px] opacity-80 pointer-events-none"></div>
            <div className="absolute bottom-[-10%] left-[20%] w-[45vw] h-[45vw] rounded-full bg-[#34C759]/20 mix-blend-multiply filter blur-[120px] opacity-80 pointer-events-none"></div>
            <div className="flex-1 flex flex-col min-h-screen relative z-10 w-full">
              {Header()}
              <main className="flex-1 w-full">{Dashboard()}</main>
            </div>
            {Modals()}
          </div>
        </>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
