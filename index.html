<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KALORIMU | Akses Portal</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
</head>

<body class="flex items-center justify-center p-6 relative overflow-hidden">
  <div id="loader"><div class="w-12 h-12 border-4 border-slate-200 border-t-black rounded-full animate-spin"></div></div>

  <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-blue-500/10 blur-[120px] rounded-full pointer-events-none"></div>

  <main class="glass-card w-full max-w-md p-10 z-10 animate-in fade-in duration-500">
    <div class="flex flex-col items-center mb-10 text-center">
      <div class="w-16 h-16 bg-black rounded-3xl flex items-center justify-center shadow-2xl mb-4 rotate-6"><span class="text-white font-black text-3xl">K</span></div>
      <h1 id="txt-title" class="text-4xl font-black tracking-tighter uppercase">KALORIKU</h1>
      <p id="txt-subtitle" class="text-[10px] font-black text-slate-400 tracking-[0.3em] uppercase">Auth Access</p>
    </div>

    <!-- Tab Mode -->
    <div class="flex bg-white/40 p-1.5 rounded-2xl mb-8">
      <button id="btn-login" onclick="toggleMode('LOGIN')" class="flex-1 py-3 text-xs font-black rounded-xl bg-black text-white shadow-lg">LOGIN</button>
      <button id="btn-register" onclick="toggleMode('REGISTER')" class="flex-1 py-3 text-xs font-black rounded-xl text-slate-400">SIGNUP</button>
    </div>

    <form id="form-auth" class="space-y-5">
      <div id="field-name" style="display: none;">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nama Lengkap</label>
        <input type="text" id="auth-name" class="glass-input mt-1.5" placeholder="Contoh: Aditya">
      </div>
      <div>
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Email</label>
        <input type="email" id="auth-email" required class="glass-input mt-1.5" placeholder="email@gmail.com">
      </div>
      <div>
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Password</label>
        <input type="password" id="auth-password" required class="glass-input mt-1.5 font-sans" placeholder="••••••••">
      </div>
      <button type="submit" id="btn-submit" class="w-full bg-black text-white font-black py-5 mt-4 rounded-3xl uppercase tracking-widest shadow-xl transition-all">Masuk Sekarang</button>
    </form>
  </main>

  <script src="config.js"></script>
  <script>
    let currentMode = 'LOGIN';

    async function checkUserOnIndex() {
      // Force hide loader after 2 detik untuk jaga-jaga
      setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000);

      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const profile = await getUserProfile(session.user.id);
        if (profile) redirectUser(profile);
      }
      document.getElementById('loader').style.display = 'none';
    }

    function redirectUser(profile) {
      if (profile.is_admin) window.location.href = 'admin.html';
      else if (profile.is_approved) window.location.href = 'dashboard.html';
      else {
        sb.auth.signOut();
        alert("Akses Tertunda: Akun kamu belum di-ACC oleh Admin.");
      }
    }

    function toggleMode(mode) {
      currentMode = mode;
      document.getElementById('btn-login').className = currentMode === 'LOGIN' ? 'flex-1 py-3 text-xs font-black rounded-xl bg-black text-white shadow-lg' : 'flex-1 py-3 text-xs font-black rounded-xl text-slate-400';
      document.getElementById('btn-register').className = currentMode === 'REGISTER' ? 'flex-1 py-3 text-xs font-black rounded-xl bg-black text-white shadow-lg' : 'flex-1 py-3 text-xs font-black rounded-xl text-slate-400';
      document.getElementById('field-name').style.display = currentMode === 'REGISTER' ? 'block' : 'none';
      document.getElementById('btn-submit').innerText = currentMode === 'LOGIN' ? 'Masuk Sekarang' : 'Daftar Sekarang';
    }

    document.getElementById('form-auth').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const name = document.getElementById('auth-name').value;
      
      document.getElementById('btn-submit').innerText = 'Harap Tunggu...';

      if (currentMode === 'LOGIN') {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) alert("Email atau Sandi Salah!"); else checkUserOnIndex();
      } else {
        const { error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
        if (error) alert(error.message); else alert("Daftar berhasil. Tunggu ACC Admin!");
      }
      document.getElementById('btn-submit').innerText = currentMode === 'LOGIN' ? 'Masuk Sekarang' : 'Daftar Sekarang';
    };

    checkUserOnIndex();
  </script>
</body>
</html>
